<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseOne - 오프라인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f2f7;
      --text: #1c1c1e;
      --text-secondary: #8e8e93;
      --accent: #007AFF;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-border: rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #f5f5f7;
        --text-secondary: #98989d;
        --accent: #0A84FF;
        --card-bg: rgba(44, 44, 46, 0.72);
        --card-border: rgba(255, 255, 255, 0.08);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      color: var(--text-secondary);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 980px;
      cursor: pointer;
      transition: opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008Z" />
      </svg>
    </div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인하고 다시 시도해주세요</p>
    <button onclick="window.location.reload()">다시 시도</button>
  </div>
</body>
</html>
